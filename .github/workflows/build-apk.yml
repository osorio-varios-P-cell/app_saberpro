name: Compilar APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: cimg/android:2024.01
    env:
      ANDROID_HOME: /home/circleci/android-sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Debug environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "No build-tools dir"
          java -version 2>&1
          whoami

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA project
        run: |
          OWNER=$(echo "$GITHUB_REPOSITORY" | cut -d/ -f1)
          REPO=$(echo "$GITHUB_REPOSITORY" | cut -d/ -f2)
          BRANCH=${GITHUB_REF#refs/heads/}
          URL="https://raw.githubusercontent.com/$OWNER/$REPO/$BRANCH/manifest.json"
          echo "URL: $URL"
          bubblewrap init --manifest="$URL" --directory=twa

      - name: Configure build
        run: |
          cd twa
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' app/build.gradle
          echo "=== app/build.gradle ==="
          head -40 app/build.gradle

      - name: Build APK
        working-directory: twa
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace
          echo "=== RESULTADO ==="
          find . -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SaberPro-APK
          path: twa/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
