name: Compilar APK SaberPro

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Copy PWA files to Android assets
        run: |
          mkdir -p android/app/src/main/assets
          # Copiar todos los archivos de la app excepto android/ y .git/
          find . -maxdepth 1 -type f \( -name "*.html" -o -name "*.json" -o -name "*.js" -o -name "*.css" \) -exec cp {} android/app/src/main/assets/ \;
          cp -r js android/app/src/main/assets/ 2>/dev/null || true
          cp -r css android/app/src/main/assets/ 2>/dev/null || true
          cp -r data android/app/src/main/assets/ 2>/dev/null || true
          cp -r assets android/app/src/main/assets/ 2>/dev/null || true
          echo "=== Assets copiados ==="
          ls -la android/app/src/main/assets/
          echo ""
          ls -laR android/app/src/main/assets/js/ 2>/dev/null | head -20

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APK
        working-directory: android
        run: |
          gradle assembleDebug --no-daemon --stacktrace
          echo "=== APK generado ==="
          find . -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaberPro-APK-v2.1
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 90
