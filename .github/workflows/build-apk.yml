name: Compilar APK SaberPro

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platforms;android-33'

      - name: Create local.properties
        working-directory: android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APK + mostrar salida
        working-directory: android
        run: |
          set +e
          gradle assembleDebug --no-daemon --stacktrace --warning-mode all 2>&1 | tee build.log
          GRADLE_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "=== Gradle exit code: $GRADLE_EXIT ==="
          echo ""
          echo "=== Ultimas 100 lineas del log ==="
          tail -100 build.log
          echo ""
          echo "=== Buscando errores ==="
          grep -i "error\|fail\|exception\|BUILD FAILED" build.log || echo "(sin errores obvios)"
          exit $GRADLE_EXIT

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaberPro-APK-v2.1
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Create Release
        if: success() && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.0
          name: "SaberPro v2.1.0 — Android 5.0+"
          body: |
            ## 📱 SaberPro APK v2.1.0
            
            ✅ Android 5.0 → Android 14
            ✅ APK universal — todos los procesadores  
            ✅ 5,011 preguntas ICFES · 5 áreas
            
            ### Instalar
            1. Descarga el APK
            2. Permite orígenes desconocidos
            3. Abre y estudia
          files: android/app/build/outputs/apk/debug/*.apk
