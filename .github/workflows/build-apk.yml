name: Compilar APK SaberPro

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_FILE: release.keystore
      KEYSTORE_PASS: SaberPro2026!
      KEY_ALIAS: saberpro
      KEY_PASS: SaberPro2026!
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Release Keystore
        working-directory: android
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias saberpro \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass SaberPro2026! \
            -keypass SaberPro2026! \
            -dname "CN=SaberPro, OU=Education, O=SaberPro, L=Bogota, ST=Cundinamarca, C=CO"
          echo "Keystore generado"
          ls -la release.keystore

      - name: Build Release APK
        working-directory: android
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Copy APK to root
        run: |
          APK=$(find android -name "*.apk" -type f | grep release | head -1)
          echo "APK: $APK"
          cp "$APK" saberpro-v2.1-release.apk
          ls -lh saberpro-v2.1-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaberPro-APK
          path: saberpro-v2.1-release.apk
          retention-days: 90
          compression-level: 0
