name: Compilar APK SaberPro

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Install http-server
        run: npm install -g http-server

      - name: Start local server & generate TWA project
        run: |
          # Start http-server in background
          http-server . -p 8080 --cors -c-1 &
          sleep 3

          # Verify server is running
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ || true

          # Initialize bubblewrap project
          mkdir -p android
          bubblewrap init --manifest http://localhost:8080/manifest.json --directory android

      - name: Configure Android build for max compatibility
        run: |
          cd android

          # Set minimum SDK for old devices (API 21 = Android 5.0 Lollipop)
          cat > gradle.properties << 'GRADLEEOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
          GRADLEEOF

          # Patch build.gradle for universal APK and old device compatibility
          cat >> app/build.gradle << 'BUILDEOF'

          // === SABERPRO: Max compatibility config ===
          android {
              defaultConfig {
                  minSdkVersion 21
                  targetSdkVersion 34
                  compileSdkVersion 34
                  versionCode 3
                  versionName "2.1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      shrinkResources false
                  }
              }
              // Generate universal APK (all CPU architectures)
              splits {
                  abi {
                      enable false
                      universalApk true
                  }
              }
          }
          BUILDEOF

      - name: Build APK
        run: |
          cd android
          # Build debug APK first (no signing needed for artifact)
          ./gradlew assembleDebug --no-daemon

          # Find the APK
          echo "=== APK Built ==="
          find . -name "*.apk" -type f

          # Copy APK to repo root
          cp app/build/outputs/apk/debug/app-debug.apk ../saberpro-v2.1.apk
          ls -lh ../saberpro-v2.1.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaberPro-APK-v2.1
          path: saberpro-v2.1.apk
          retention-days: 90
          compression-level: 0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: v2.1.0
          name: "SaberPro v2.1.0 — APK Compatible"
          body: |
            ## 📱 SaberPro APK v2.1.0
            
            ✅ Compatible con **todos los celulares** (Android 5.0 Lollipop en adelante)
            ✅ **5,011 preguntas** ICFES — 5 áreas
            ✅ Gamificación, simulacros, 11 temas
            
            ### Compatibilidad
            - 📱 Android 5.0 (API 21) → Android 14 (API 34)
            - 📱 Universal APK — todos los procesadores (ARM, ARM64, x86)
            - 📱 Mínimo 50 MB libres en el dispositivo
            
            ### Instalación
            1. Descarga el APK
            2. Permite "Instalar apps de fuentes desconocidas"
            3. Abre el APK e instala
            4. ¡A estudiar!
          files: saberpro-v2.1.apk
          draft: false
          prerelease: false
          generate_release_notes: false
