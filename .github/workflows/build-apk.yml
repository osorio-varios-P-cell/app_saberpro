name: Compilar APK via PWABuilder Cloud

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK via PWABuilder API
        run: |
          OWNER=$(echo "$GITHUB_REPOSITORY" | cut -d/ -f1)
          REPO=$(echo "$GITHUB_REPOSITORY" | cut -d/ -f2)
          BRANCH=${GITHUB_REF#refs/heads/}
          MANIFEST_URL="https://raw.githubusercontent.com/$OWNER/$REPO/$BRANCH/manifest.json"
          echo "Manifest: $MANIFEST_URL"
          
          # PWABuilder cloud API - submit manifest for Android build
          RESPONSE=$(curl -s -X POST "https://pwabuilder-apiv2.azurewebsites.net/packages/create" \
            -H "Content-Type: application/json" \
            -d "{\"url\": \"$MANIFEST_URL\"}")
          
          echo "Response: $RESPONSE"
          
          # The API returns a package ID we can poll
          PACKAGE_ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "Package ID: $PACKAGE_ID"
          
          if [ -z "$PACKAGE_ID" ]; then
            echo "ERROR: No package ID returned"
            echo "Full response:"
            curl -s "https://pwabuilder-apiv2.azurewebsites.net/packages/create" \
              -H "Content-Type: application/json" \
              -d "{\"url\": \"$MANIFEST_URL\"}"
            exit 1
          fi
          
          # Poll for completion
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(curl -s "https://pwabuilder-apiv2.azurewebsites.net/packages/$PACKAGE_ID")
            echo "[$i] Status: $STATUS" | head -c 200
            echo ""
            
            if echo "$STATUS" | grep -q '"status":"complete"'; then
              DOWNLOAD_URL=$(echo "$STATUS" | grep -o '"downloadUrl":"[^"]*"' | head -1 | cut -d'"' -f4)
              echo "Download URL: $DOWNLOAD_URL"
              curl -L -o saberpro.apk "$DOWNLOAD_URL" || curl -L -o saberpro.apk "${DOWNLOAD_URL//\\/}"
              ls -lh saberpro.apk
              exit 0
            fi
          done
          echo "Timeout waiting for build"
          exit 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SaberPro-APK
          path: saberpro.apk
          if-no-files-found: error
