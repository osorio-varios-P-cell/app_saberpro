name: Compilar APK SaberPro

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Extract repo owner and name
        id: repo
        run: |
          OWNER=$(echo "$GITHUB_REPOSITORY" | cut -d/ -f1)
          REPO=$(echo "$GITHUB_REPOSITORY" | cut -d/ -f2)
          BRANCH=${GITHUB_REF#refs/heads/}
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "MANIFEST_URL=https://raw.githubusercontent.com/$OWNER/$REPO/$BRANCH/manifest.json"

      - name: Initialize TWA project
        run: |
          OWNER=$(echo "$GITHUB_REPOSITORY" | cut -d/ -f1)
          REPO=$(echo "$GITHUB_REPOSITORY" | cut -d/ -f2)
          BRANCH=${GITHUB_REF#refs/heads/}
          URL="https://raw.githubusercontent.com/$OWNER/$REPO/$BRANCH/manifest.json"
          echo "Using manifest: $URL"
          
          mkdir -p twa-project
          cd twa-project
          bubblewrap init --manifest="$URL" --directory=.

      - name: Configure for max compatibility
        run: |
          cd twa-project
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          # Android 5.0+ para cubrir celulares viejos y nuevos
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' app/build.gradle 2>/dev/null || true
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/' app/build.gradle 2>/dev/null || true
          sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/' app/build.gradle 2>/dev/null || true
          echo "=== build.gradle ==="
          cat app/build.gradle

      - name: Build APK
        working-directory: twa-project
        run: |
          ./gradlew assembleDebug --no-daemon
          echo "=== APK ==="
          find . -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SaberPro-APK-v2.1
          path: twa-project/app/build/outputs/apk/debug/*.apk
          retention-days: 90
          if-no-files-found: warn
