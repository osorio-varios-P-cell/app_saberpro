name: Compilar APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: cimg/android:2024.01
    steps:
      - uses: actions/checkout@v4

      - name: Install Node + Bubblewrap
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs
          sudo npm install -g @bubblewrap/cli

      - name: Init TWA from repo URL
        run: |
          OWNER=$(echo "$GITHUB_REPOSITORY" | cut -d/ -f1)
          REPO=$(echo "$GITHUB_REPOSITORY" | cut -d/ -f2)
          BRANCH=${GITHUB_REF#refs/heads/}
          URL="https://raw.githubusercontent.com/$OWNER/$REPO/$BRANCH/manifest.json"
          echo "Manifest URL: $URL"
          
          bubblewrap init --manifest="$URL" --directory=twa

      - name: Set minSdk 21 (old phones)
        run: |
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' twa/app/build.gradle
          echo "sdk.dir=$ANDROID_HOME" > twa/local.properties
          cat twa/app/build.gradle | head -30

      - name: Build APK
        working-directory: twa
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace
          find . -name "*.apk" -exec ls -lh {} \;
          cp app/build/outputs/apk/debug/app-debug.apk ../saberpro.apk || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SaberPro-APK
          path: twa/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
