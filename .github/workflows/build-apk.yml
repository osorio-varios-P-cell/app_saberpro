name: Compilar APK SaberPro

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Copy PWA files to Android assets
        run: |
          mkdir -p android/app/src/main/assets
          find . -maxdepth 1 -type f \( -name "*.html" -o -name "*.json" -o -name "*.js" -o -name "*.css" \) -exec cp {} android/app/src/main/assets/ \;
          cp -r js android/app/src/main/assets/ 2>/dev/null || true
          cp -r css android/app/src/main/assets/ 2>/dev/null || true
          cp -r data android/app/src/main/assets/ 2>/dev/null || true
          cp -r assets android/app/src/main/assets/ 2>/dev/null || true
          echo "Assets copiados:"
          ls -la android/app/src/main/assets/ | head -20

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "ANDROID_HOME=$ANDROID_HOME"
          cat android/local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APK
        working-directory: android
        run: |
          # Verificar que todo esta en orden
          echo "=== SDK check ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          cat local.properties
          echo ""
          echo "=== Project files ==="
          ls -la
          ls -la app/
          ls -la app/src/main/
          echo ""
          echo "=== Assets ==="
          ls app/src/main/assets/ | head -20
          echo ""
          echo "=== Building ==="
          gradle assembleDebug --no-daemon --stacktrace --warning-mode all 2>&1 | tee build.log
          GRADLE_EXIT=${PIPESTATUS[0]}
          echo ""
          echo "=== Gradle exit: $GRADLE_EXIT ==="
          echo ""
          echo "=== Buscando APK ==="
          find . -name "*.apk" -type f -exec ls -lh {} \; 2>/dev/null || echo "No APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SaberPro-APK-v2.1
          path: |
            android/app/build/outputs/**/*.apk
            android/**/*.apk
          retention-days: 90
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android/build.log
          retention-days: 7

      - name: Upload APK (if found)
        uses: actions/upload-artifact@v4
        with:
          name: SaberPro-APK-v2.1
          path: |
            android/app/build/outputs/**/*.apk
            android/**/*.apk
          retention-days: 90
          if-no-files-found: warn
