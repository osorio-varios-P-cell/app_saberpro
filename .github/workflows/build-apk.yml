name: Compilar APK SaberPro

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platforms;android-33'

      - name: Show Android SDK path
        run: echo "ANDROID_HOME=$ANDROID_HOME" && echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" && ls $ANDROID_HOME || true

      - name: Create local.properties
        working-directory: android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          cat local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace --info 2>&1 | tail -200

      - name: Copy APK to root
        if: success()
        run: |
          echo "=== Buscando APK ==="
          find android -name "*.apk" -type f
          APK=$(find android -name "*.apk" -type f | head -1)
          if [ -z "$APK" ]; then
            echo "No APK found, checking build outputs..."
            find android -name "*.apk" -o -name "*.aab" 2>/dev/null
            ls -la android/app/build/outputs/ 2>/dev/null || true
            exit 1
          fi
          echo "APK found: $APK"
          ls -lh "$APK"
          cp "$APK" saberpro-v2.1.apk
          ls -lh saberpro-v2.1.apk

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SaberPro-APK-v2.1
          path: saberpro-v2.1.apk
          retention-days: 90

      - name: Create Release
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.0
          name: "SaberPro v2.1.0 — Android 5.0+"
          body: |
            ## 📱 SaberPro APK v2.1.0
            
            ✅ **Android 5.0 Lollipop → Android 14**
            ✅ **APK universal** — todos los procesadores
            ✅ **5,011 preguntas** ICFES · 5 áreas · Gamificación
            
            ### Instalación
            1. Descarga el APK
            2. Permite instalar apps de fuentes desconocidas
            3. Abre y estudia
          files: saberpro-v2.1.apk
