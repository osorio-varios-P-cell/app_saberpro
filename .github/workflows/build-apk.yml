name: Compilar APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Copy PWA files to assets
        run: |
          mkdir -p twa/app/src/main/assets
          cp index.html twa/app/src/main/assets/
          cp demo.html twa/app/src/main/assets/
          cp pago.html twa/app/src/main/assets/
          cp manifest.json twa/app/src/main/assets/
          cp service-worker.js twa/app/src/main/assets/
          cp -r css twa/app/src/main/assets/
          cp -r js twa/app/src/main/assets/
          cp -r data twa/app/src/main/assets/
          cp -r assets twa/app/src/main/assets/ 2>/dev/null || true
          echo "Assets ready:"
          ls twa/app/src/main/assets/

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
          generate-gradle-wrapper: true

      - name: Create local.properties
        working-directory: twa
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build APK
        working-directory: twa
        run: gradle assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: SaberPro-APK
          path: twa/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
