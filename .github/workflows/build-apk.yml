name: Compilar APK SaberPro

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Copy APK to root
        run: |
          APK=$(find android -name "*.apk" -type f | head -1)
          echo "APK found: $APK"
          cp "$APK" saberpro-v2.1-debug.apk
          ls -lh saberpro-v2.1-debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaberPro-APK-v2.1
          path: saberpro-v2.1-debug.apk
          retention-days: 90
          compression-level: 0

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          tag_name: v2.1.0
          name: "SaberPro v2.1.0"
          body: |
            ## 📱 SaberPro v2.1.0 — APK Universal
            
            ✅ **Compatible con todos los celulares Android 5.0+**
            
            ### 📦 Incluye
            - 5,011 preguntas ICFES Saber 11 (5 áreas)
            - Simulacros cronometrados de 2 horas
            - Sistema de XP, niveles y 15 insignias
            - 11 temas visuales
            - Rachas diarias y estadísticas
            - Modo offline (sin internet)
            - Actualizaciones vía WiFi local
            
            ### 📱 Compatibilidad
            - 🤖 Android 5.0 Lollipop (API 21) → Android 14 (API 34)
            - 📱 APK universal — todos los procesadores
            - 💾 ~2 MB de descarga
            
            ### 🔧 Instalación
            1. Descarga el APK
            2. Activa "Orígenes desconocidos" en Ajustes → Seguridad
            3. Abre el APK e instala
            4. ¡Listo!
          files: saberpro-v2.1-debug.apk
          draft: false
          prerelease: false
          generate_release_notes: false
