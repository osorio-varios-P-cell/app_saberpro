name: Compilar APK SaberPro

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Install PWABuilder
        run: npm install -g pwabuilder

      - name: Start local server
        run: |
          npx http-server . -p 8080 -c-1 &
          sleep 3
          curl -s http://localhost:8080/manifest.json | head -5
          echo ""

      - name: Generate Android project with PWABuilder
        run: |
          pwabuilder --manifest http://localhost:8080/manifest.json --output android-gen

      - name: Patch minSdk for old devices
        run: |
          if [ -f android-gen/app/build.gradle ]; then
            sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' android-gen/app/build.gradle
          fi
          if [ -f android-gen/local.properties ]; then
            echo "sdk.dir=$ANDROID_HOME" >> android-gen/local.properties
          else
            echo "sdk.dir=$ANDROID_HOME" > android-gen/local.properties
          fi

      - name: Build APK
        working-directory: android-gen
        run: |
          ./gradlew assembleDebug --no-daemon
          echo "=== APK ==="
          find . -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaberPro-APK-v2.1
          path: android-gen/app/build/outputs/apk/debug/*.apk
          retention-days: 90
