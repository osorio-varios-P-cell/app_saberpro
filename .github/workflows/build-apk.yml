name: Compilar APK SaberPro

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PWABuilder CLI
        run: npm install -g @pwabuilder/cli

      - name: Start local server
        run: |
          npx http-server . -p 8080 --cors -c-1 -s &
          sleep 3
          curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:8080/manifest.json
          echo ""

      - name: Generate Android Project
        run: |
          npx pwabuilder build --manifest http://localhost:8080/manifest.json --output android-project --platform android --androidOptions.sdkVersion 21
          echo "=== Proyecto generado ==="
          ls -la android-project/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Build APK from generated project
        run: |
          cd android-project
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          # Ajustar minSdk a 21 para compatibilidad con celulares viejos
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/g' app/build.gradle
          ./gradlew assembleDebug --no-daemon
          echo "=== APK ==="
          find . -name "*.apk" -exec ls -lh {} \;

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaberPro-APK-v2.1
          path: android-project/app/build/outputs/apk/debug/*.apk
          retention-days: 90
